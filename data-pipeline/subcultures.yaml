    proxy_gap: |
      Aimed at the severe-untreated-mental-illness archetype. DREM (cognitive
      / mental-health difficulty) is the heaviest soft signal at weight 5;
      the structural gate is DIS=1 + PUBCOV=1 + age 25-55. The "stinks like
      piss" detail is proxied by PLM=2 (incomplete plumbing — no shower /
      no toilet); the unhoused / sheltered subset is captured by RELSHIPP=38
      (noninstitutionalized group quarters) and TEN=4 (occupied without
      payment). PUMS does not reach the entirely unsheltered population.
      Addiction, psychiatric diagnosis, criminal-justice involvement, and
      yelling-in-public are unmeasurable. Geography expected: Tenderloin and
      Mission (SF), Skid Row and parts of Hollywood (LA), East Oakland,
      central San Diego, downtown Sacramento, plus the working-class non-
      major cities (Stockton, Modesto, Bakersfield, Fresno, San Bernardino).


# California Subculture Library, working set.
#
# Each subculture is a vector of weighted census variable conditions.
# Operators: range [min, max], in [values...], gte n, lte n, eq value.
# Weight: 1 = matters, 2 = strongly defines.
# Variables refer to ACS PUMS field names.
#
# Membership rule: a PUMS record counts as a cohort member if (a) every
# `required: true` condition passes AND (b) the weighted soft-similarity
# score is at or above `threshold`. The PUMA-level estimand is then the
# count of members weighted by PWGTP. The soft score is retained as a
# secondary within-cohort fit diagnostic. See METHODOLOGY.md "Scoring".
#
# Cohorts sidelined from the active set live in subcultures_library.yaml
# for reference. Move blocks between the two files to activate or archive
# a cohort; only this file is read by the pipeline.

settings:
  state_fips: "06"
  pums_year: 2023
  pums_endpoint: "acs1"
  output_geometry: puma
  # Default membership threshold τ applied across cohorts that don't override.
  # Records below threshold do not count as members. Default 0.5 means a
  # cohort member must capture at least half of the cohort vector's total
  # weight (gates included). Override per-cohort with `threshold:` on the
  # cohort entry.
  default_threshold: 0.5

subcultures:
  - id: teen_boy
    name: Teen boy
    vibe: halo with the headset on, skateboard in the garage, mom does carpools, dad's working late
    # Teen boy in an upper-middle two-parent owner-occupied household with
    # a working father and a stay-at-home mother. ESP=2 (PUMS recode for
    # children <18: "two parents, father only in labor force") does the
    # identity heavy-lifting directly without proxy guesswork.
    tract_marginals:
      - B19001_017E # households earning $200k+ (upper-middle concentration)
      - B25024_002E # 1-unit detached structures (single-family neighborhoods)
      - B11003_002E # married-couple family households with own children under 18 (the structural proxy for "household that contains a teen")
    vector:
      # ───── Hard gates: teen boy in trad upper-middle HH ─────
      - { field: AGEP, op: range, value: [13, 17], weight: 2, required: true } # teen (ESP defined only <18)
      - { field: SEX, op: eq, value: 1, weight: 1.5, required: true } # male
      - { field: ESP, op: in, value: [1, 2], weight: 2, required: true } # two-parent HH (1 = both in LF, 2 = father only in LF)
      - { field: ESP, op: eq, value: 2, weight: 3 } # SAHM archetype bonus (heavy soft; dad works, mom doesn't)
      - { field: RELSHIPP, op: in, value: [25, 26, 27], weight: 1, required: true } # biological / adopted / step child of householder
      - { field: TEN, op: in, value: [1, 2], weight: 1.5, required: true } # any owner-occupied (mortgage or paid off — admits established families who've paid off)
      - { field: TEN, op: eq, value: 1, weight: 1 } # owned-with-mortgage bonus (on the property ladder, the "upward mobility" subset)
      - { field: HINCP, op: gte, value: 80000, weight: 1.5, required: true } # middle-class floor (CA median is ~$95k)
      - { field: VEH, op: gte, value: 1, weight: 1.5, required: true } # at least one vehicle (relaxed; multi-car captured below as bonus)

      # ───── Income — bonused for higher bands so the cohort still skews upper-middle visually ─────
      - { field: HINCP, op: gte, value: 120000, weight: 1.5 } # upper-middle threshold
      - { field: HINCP, op: gte, value: 175000, weight: 1.5 } # solid upper-middle
      - { field: HINCP, op: gte, value: 250000, weight: 1 } # near top quintile
      - { field: POVPIP, op: gte, value: 400, weight: 1 } # well above poverty

      # ───── Mobility: moved recently (upward-mobility signal) ─────
      - { field: MV, op: in, value: [1, 2, 3, 4], weight: 1.5 } # moved within last ~10 years
      - { field: MV, op: in, value: [1, 2, 3], weight: 1 } # extra for last ~5 years

      # ───── House profile: newer, larger, detached, connected ─────
      - { field: YRBLT, op: gte, value: 1990, weight: 1 }
      - { field: YRBLT, op: gte, value: 2010, weight: 1 } # extra for very new
      - { field: BDSP, op: gte, value: 4, weight: 1 } # 4+ bedrooms
      - { field: BLD, op: eq, value: 2, weight: 1.5 } # single-family detached
      - { field: BROADBND, op: eq, value: 1, weight: 0.5 } # broadband
      - { field: LAPTOP, op: eq, value: 1, weight: 0.5 } # computer in HH
      - { field: VEH, op: gte, value: 2, weight: 1 } # 2+ vehicles (the canonical "one car per parent" pattern)
      - { field: VEH, op: gte, value: 3, weight: 0.5 } # 3+ vehicles (extra past gate)
    proxy_gap: |
      Captures teenage boys in middle- and upper-middle-class two-parent
      owner-occupied households. Income gate at $80k is the CA middle-
      class floor (CA median HH income ~$95k); $120k, $175k, and $250k
      are layered as soft bonuses so the cohort still skews visually
      toward upper-middle without excluding the broader middle. Tenure
      gate admits both mortgaged and paid-off homes (TEN in [1, 2]) with
      a soft bonus on TEN=1 to retain the "on the property ladder"
      signal; vehicle gate at VEH≥1 with soft bonuses for 2+ and 3+ so
      the multi-car pattern still concentrates dots without excluding
      one-car middle-class households. ESP gates on any two-parent HH
      (codes 1 or 2 — both-LF or father-only-LF) because the SAHM-only
      variant is rare in CA at these income levels; the SAHM archetype
      (ESP=2) is retained as a heavy soft bonus. Doesn't capture
      skateboard ownership, Halo playtime, or any specific cultural
      content — those are unmeasurable. Geography depends on where these
      households actually concentrate; the map will reveal rather than
      presume.

  - id: younger_sister
    name: Younger sister
    vibe: wants a horse but doesn't actually like the riding lessons. polly pockets. her brother picks what's on tv.
    # Younger sister of the teen_boy archetype: same household template,
    # age and sex swapped. AGEP [5, 11] covers the Polly-Pockets-through-
    # horse-girl childhood window. ESP=2 bonus retained for the SAHM
    # variant; otherwise structurally identical to teen_boy.
    tract_marginals:
      - B19001_017E # households earning $200k+ (upper-middle concentration)
      - B25024_002E # 1-unit detached structures (single-family neighborhoods)
      - B11003_002E # married-couple family households with own children under 18
    vector:
      # ───── Hard gates: young girl in trad middle/upper-middle HH ─────
      - { field: AGEP, op: range, value: [5, 11], weight: 2, required: true } # child (ESP defined only <18)
      - { field: SEX, op: eq, value: 2, weight: 1.5, required: true } # female
      - { field: ESP, op: in, value: [1, 2], weight: 2, required: true } # two-parent HH
      - { field: ESP, op: eq, value: 2, weight: 3 } # SAHM archetype bonus (heavy soft)
      - { field: RELSHIPP, op: in, value: [25, 26, 27], weight: 1, required: true } # biological / adopted / step child of householder
      - { field: TEN, op: in, value: [1, 2], weight: 1.5, required: true } # any owner-occupied (mortgage or paid off)
      - { field: TEN, op: eq, value: 1, weight: 1 } # owned-with-mortgage bonus
      - { field: HINCP, op: gte, value: 80000, weight: 1.5, required: true } # middle-class floor
      - { field: VEH, op: gte, value: 1, weight: 1.5, required: true } # at least one vehicle

      # ───── Income — bonused for higher bands ─────
      - { field: HINCP, op: gte, value: 120000, weight: 1.5 } # upper-middle threshold
      - { field: HINCP, op: gte, value: 175000, weight: 1.5 } # solid upper-middle
      - { field: HINCP, op: gte, value: 250000, weight: 1 } # near top quintile
      - { field: POVPIP, op: gte, value: 400, weight: 1 } # well above poverty

      # ───── Mobility: moved recently (upward-mobility signal) ─────
      - { field: MV, op: in, value: [1, 2, 3, 4], weight: 1.5 } # moved within last ~10 years
      - { field: MV, op: in, value: [1, 2, 3], weight: 1 } # extra for last ~5 years

      # ───── House profile: newer, larger, detached, connected ─────
      - { field: YRBLT, op: gte, value: 1990, weight: 1 }
      - { field: YRBLT, op: gte, value: 2010, weight: 1 } # extra for very new
      - { field: BDSP, op: gte, value: 4, weight: 1 } # 4+ bedrooms
      - { field: BLD, op: eq, value: 2, weight: 1.5 } # single-family detached
      - { field: BROADBND, op: eq, value: 1, weight: 0.5 } # broadband
      - { field: LAPTOP, op: eq, value: 1, weight: 0.5 } # computer in HH
      - { field: VEH, op: gte, value: 2, weight: 1 } # 2+ vehicles (the canonical "one car per parent" pattern)
      - { field: VEH, op: gte, value: 3, weight: 0.5 } # 3+ vehicles (extra past gate)
    proxy_gap: |
      Mirrors teen_boy structurally — girls 5-11 in middle- and upper-
      middle-class two-parent owner-occupied households. The "younger
      sister of a teen boy" framing is editorial; PUMS doesn't expose a
      direct way to verify presence of an older brother on her record
      without aggregate-sibling fields the pipeline doesn't currently
      load. Polly Pockets, unwanted riding lessons, and tv-remote
      politics are unmeasurable; geography depends on where these
      households cluster, same as teen_boy.
